: "", "situacion": "", "web": "SS", "reservado": false, "weblink": null}]};const PAGE_SIZE=25;
const OPC_MAP={"YW8": "Garantía 2+3", "PJP": "Llanta 16\" Machined", "PW1": "Winter Pack", "PW2": "Winter Pack", "PTC": "Techo eléctrico", "PUK": "Llanta 18\" Performance", "PAK": "Sensor parking trasero", "PFK": "Cuadro digital", "PCR": "Cámara trasera", "PCI": "Cámara trasera", "PB1": "Edge Pack", "WB1": "Edge Pack", "WB2": "Edge Pack Plus", "PD2": "Dynamic Pack", "WF1": "Intelligent Pack", "WF2": "Intelligent Pack", "WF4": "Intelligent Pack", "PF4": "Intelligent Pack", "R8E": "Llanta Garbí Copper", "R8A": "Llanta 18\" Sonora", "PS2": "Dynamic Design", "PP1": "Pure Performance Pack", "PGS": "Gancho remolque eléctrico", "PA1": "Immersive Pack", "Z9A": "Llantas 19\" Sandstorm", "Z9C": "Llantas 19\" Arctic", "Z9E": "Llantas 19\" Dark", "Z0B": "Pack exterior", "PNB": "Beats Audio", "WLJ": "Asientos eléctricos", "P7P": "7 Plazas", "PUR": "Llanta 17\" Dynamic", "PTA": "Techo panorámico eléctrico"};
const state={seat:{p:1},cupra:{p:1},semi:{p:1}};

function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
}
function fmtEur(v){return (v==null)?'Consultar':v.toLocaleString('es-ES')+' €';}
function fmtKm(v){return (v==null)?'—':v.toLocaleString('es-ES')+' km';}

const popup=document.getElementById('opc-popup');const opcList=document.getElementById('opc-list');
let activeBtn=null;
function showOpc(btn,raw){
  if(activeBtn===btn){hideOpc();return;}
  activeBtn=btn;
  const codes=raw.trim().split(/\s+/).filter(Boolean);
  opcList.innerHTML=codes.map(c=>{const d=OPC_MAP[c]||'—';return `<li><span class="code">${c}</span>${d}</li>`;}).join('');
  popup.classList.add('show');
  const r=btn.getBoundingClientRect();const pw=240,ph=popup.offsetHeight||80;
  let left=r.left,top=r.bottom+6;
  if(left+pw>window.innerWidth-8) left=window.innerWidth-pw-8;
  if(top+ph>window.innerHeight-8) top=r.top-ph-6;
  popup.style.left=left+'px';popup.style.top=top+'px';
}
function hideOpc(){popup.classList.remove('show');activeBtn=null;}
document.addEventListener('click',e=>{if(!e.target.closest('.opc-eye')&&!e.target.closest('#opc-popup'))hideOpc();});
function opcCell(raw){
  if(!raw||!raw.trim()) return '—';
  return `<span class="opc-wrap"><span class="opc-eye" title="Ver opcionales" onclick='event.stopPropagation();showOpc(this,${JSON.stringify(raw)})'>👁</span></span>`;
}
function webCell(r){
  if(r.weblink) return `<a class="web-link" href="${r.weblink}" target="_blank" rel="noopener">Ver anuncio</a>`;
  return '<span class="badge-pendiente">Pendiente</span>';
}

function filterData(tab){
  const fm=document.getElementById('fm-'+tab).value;
  const ft=document.getElementById('ft-'+tab).value;
  const fc=document.getElementById('fc-'+tab).value;
  const fs=document.getElementById('fs-'+tab).value.trim().toLowerCase();
  return DATA[tab].filter(r=>{
    if(fm && r.grupo!==fm) return false;
    if(ft && r.tipo!==ft) return false;
    if(fc && r.color!==fc) return false;
    if(fs){
      const hay=[r.matricula,r.chasis,r.color,r.modelo].join(' ').toLowerCase();
      if(!hay.includes(fs)) return false;
    }
    return true;
  });
}
function setPages(tab,pages,total){
  document.getElementById('cnt-'+tab).textContent=total+' vehículo'+(total===1?'':'s');
  const el=document.getElementById('pag-'+tab);
  if(pages<=1){el.innerHTML='';return;}
  let h='';
  h+=`<button ${state[tab].p===1?'disabled':''} onclick="goPage('${tab}',${state[tab].p-1})">‹</button>`;
  for(let i=1;i<=pages;i++){h+=`<button class="${i===state[tab].p?'active':''}" onclick="goPage('${tab}',${i})">${i}</button>`;}
  h+=`<button ${state[tab].p===pages?'disabled':''} onclick="goPage('${tab}',${state[tab].p+1})">›</button>`;
  el.innerHTML=h;
}
function goPage(tab,p){state[tab].p=p;renderTab(tab);}

function renderTab(tab){
  const filtered=filterData(tab);
  const total=filtered.length;
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(state[tab].p>pages) state[tab].p=pages;
  const start=(state[tab].p-1)*PAGE_SIZE;
  const slice=filtered.slice(start,start+PAGE_SIZE);
  const tbody=document.getElementById('tbody-'+tab);
  let html='';let prev=null;
  if(tab==='semi'){
    slice.forEach(r=>{
      const sep=(prev!==null&&r.modelo!==prev)?'group-sep':'';prev=r.modelo;
      const res=r.reservado?'reservado':'';
      const ubic=r.reservado?'<span class="ubicado-reservado">Reservado</span>':(r.ubicado||'—');
      html+=`<tr class="${[sep,res].filter(Boolean).join(' ')}"><td class="model-cell">${r.modelo}</td><td><span class="badge b-tipo">${r.tipo}</span></td><td>${opcCell(r.opciones)}</td><td>${r.matricula}</td><td class="chasis-cell">${r.chasis||'—'}</td><td>${fmtKm(r.km)}</td><td>${r.color}</td><td>${r.fecha||'—'}</td><td style="font-weight:700">${fmtEur(r.venta)}</td><td>${ubic}</td><td>${webCell(r)}</td></tr>`;
    });
  } else {
    slice.forEach(r=>{
      const sep=(prev!==null&&r.modelo!==prev)?'group-sep':'';prev=r.modelo;
      const res=r.reservado?'reservado':'';
      const ubic=res?'<span class="ubicado-reservado">Reservado</span>':(r.ubicado||'—');
      html+=`<tr class="${[sep,res].filter(Boolean).join(' ')}"><td class="model-cell">${r.modelo}</td><td><span class="badge b-tipo">${r.tipo}</span></td><td>${opcCell(r.opciones)}</td><td>${r.matricula}</td><td class="chasis-cell">${r.chasis||'—'}</td><td>${fmtKm(r.km)}</td><td>${r.color}</td><td>${r.fecha||'—'}</td><td>${r.perma||'—'}</td><td style="font-weight:700">${fmtEur(r.venta)}</td><td>${ubic}</td><td>${webCell(r)}</td></tr>`;
    });
  }
  tbody.innerHTML=html||'<tr><td colspan="12" style="text-align:center;padding:2rem;color:#9a9a9f">Sin resultados</td></tr>';
  setPages(tab,pages,total);
}
function renderSeat(){state.seat.p=1;renderTab('seat');}
function renderCupra(){state.cupra.p=1;renderTab('cupra');}
function renderSemi(){state.semi.p=1;renderTab('semi');}
renderTab('seat');renderTab('cupra');renderTab('semi');
</script>
